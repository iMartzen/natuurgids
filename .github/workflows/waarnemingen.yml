name: Waarnemingen bijwerken

on:
  schedule:
    - cron: '0 6 * * *'   # elke dag om 6:00 UTC
  workflow_dispatch:        # handmatig starten mogelijk

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Waarnemingen ophalen
        run: |
          curl -s \
            -H "Accept: application/json" \
            -H "Accept-Language: nl" \
            "https://waarneming.nl/api/v1/observations/?user=99467&page_size=10&format=json" \
            -o _data/waarnemingen.json

      - name: Commit als er iets veranderd is
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/waarnemingen.json
          git diff --staged --quiet || git commit -m "Waarnemingen bijgewerkt $(date +%Y-%m-%d)"
          git push
