<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description"
    content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 155 }}{% else %}{{ site.description }}{% endif %}">

{% if site.waarneming.user_id %}
<meta name="waarneming-user-id" content="{{ site.waarneming.user_id }}">
<meta name="waarneming-profile" content="{{ site.waarneming.profile_url }}">
{% endif %}

    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap"
    rel="stylesheet">
