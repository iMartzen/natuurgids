<!DOCTYPE html>
<html lang="nl">
  <head>
    {% include head.html %}
  </head>
  <body>
    {% include header.html %}

    <header class="page-hero">
      <div class="container">
        <p class="page-hero__eyebrow">Veldaantekeningen</p>
        <h1 class="page-hero__title">{{ page.title }}</h1>
        {% if page.subtitle %}
        <p class="page-hero__subtitle">{{ page.subtitle }}</p>
        {% endif %}
      </div>
    </header>

    <main class="site-main">
      <div class="container">
        <div class="main-with-sidebar">
          <div class="main-content">
            <div class="page-content">
              {{ content }}
            </div>
          </div>
          <aside class="sidebar" aria-label="Zijbalk">
            {% include sidebar.html %}
          </aside>
        </div>
      </div>
    </main>

    {% include footer.html %}

    <script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/waarnemingen.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/filters.js' | relative_url }}"></script>
  </body>
</html>
